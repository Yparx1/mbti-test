<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type Icons Preview</title>
<style>
  body { margin:0; padding:40px; background:#F5F0E8; font-family: Georgia, serif; color:#3a3530; }
  h1 { text-align:center; font-weight:400; letter-spacing:.05em; }
  .grid { max-width:780px; margin:30px auto; display:grid; grid-template-columns:repeat(4,1fr); gap:28px; }
  .card { background:#EEE9E0; border:1px solid #d9d0c4; border-radius:16px; padding:18px; text-align:center; }
  .check {
    width:120px; height:120px; margin:0 auto 10px;
    display:flex; align-items:center; justify-content:center;
    background-image: linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%);
    background-size:18px 18px;
    background-position:0 0,0 9px,9px -9px,-9px 0px;
    background-color:#fff;
    border-radius:10px;
  }
  img { width:92px; height:92px; object-fit:contain; display:block; filter: drop-shadow(0 6px 10px rgba(58,53,48,.12)); }
  .label { font-size:14px; letter-spacing:.14em; font-weight:bold; }
</style>
</head>
<body>
<h1>Type Icons Extracted From Full Grid</h1>
<div class="grid">
  <div class="card"><div class="check"><img src="icons/types/intj.png" alt="INTJ"></div><div class="label">INTJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/intp.png" alt="INTP"></div><div class="label">INTP</div></div>
  <div class="card"><div class="check"><img src="icons/types/entj.png" alt="ENTJ"></div><div class="label">ENTJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/entp.png" alt="ENTP"></div><div class="label">ENTP</div></div>
  <div class="card"><div class="check"><img src="icons/types/infj.png" alt="INFJ"></div><div class="label">INFJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/infp.png" alt="INFP"></div><div class="label">INFP</div></div>
  <div class="card"><div class="check"><img src="icons/types/enfj.png" alt="ENFJ"></div><div class="label">ENFJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/enfp.png" alt="ENFP"></div><div class="label">ENFP</div></div>
  <div class="card"><div class="check"><img src="icons/types/istj.png" alt="ISTJ"></div><div class="label">ISTJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/isfj.png" alt="ISFJ"></div><div class="label">ISFJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/estj.png" alt="ESTJ"></div><div class="label">ESTJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/esfj.png" alt="ESFJ"></div><div class="label">ESFJ</div></div>
  <div class="card"><div class="check"><img src="icons/types/istp.png" alt="ISTP"></div><div class="label">ISTP</div></div>
  <div class="card"><div class="check"><img src="icons/types/isfp.png" alt="ISFP"></div><div class="label">ISFP</div></div>
  <div class="card"><div class="check"><img src="icons/types/estp.png" alt="ESTP"></div><div class="label">ESTP</div></div>
  <div class="card"><div class="check"><img src="icons/types/esfp.png" alt="ESFP"></div><div class="label">ESFP</div></div>
</div>
</body>
</html>
