<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#F5F0E8">
<title>MBTI Personality Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
  }
  body {
    background: #F5F0E8;
    font-family: Georgia, serif;
    min-height: 100vh;
    color: #3a3530;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #F5F0E8;
    background-image: url('bg-landmark-sketch.png');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: auto 100vh;
    opacity: 0.13;
    pointer-events: none;
    z-index: 0;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    will-change: transform;
  }
  .app { max-width: 620px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; position: relative; z-index: 1; }

  .header { text-align: center; margin-bottom: 3rem; }
  .progress-wrap, .question-block, .intro-screen, .result-screen { position: relative; }
  .header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.18em; color: #9c9186; text-transform: uppercase; margin-bottom: 0.5rem; }
  .header p { font-size: 22px; font-weight: 400; color: #3a3530; line-height: 1.4; }

  .progress-wrap { margin-bottom: 2.5rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #a09585; margin-bottom: 8px; letter-spacing: 0.05em; }
  .progress-bar { height: 2px; background: #e0d8cc; border-radius: 2px; }
  .progress-fill { height: 2px; background: #b5a898; border-radius: 2px; transition: width 0.4s ease; }

  .question-block { margin-bottom: 2.5rem; }
  .question-text { font-size: 17px; line-height: 1.65; color: #3a3530; margin-bottom: 1.2rem; font-weight: 400; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: rgba(238, 233, 224, 0.96);
    border: 0.5px solid #d9d0c4;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    font-size: 15px;
    color: #5a5148;
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.5;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-family: Georgia, serif;
  }
  .option-btn:hover { background: #e6ddd1; border-color: #c5bab0; color: #3a3530; }
  .option-btn.selected { background: #d6ccbf; border-color: #b5a898; color: #3a3530; }
  .option-letter { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: #b5a898; min-width: 14px; margin-top: 2px; text-transform: uppercase; }
  .option-btn.selected .option-letter { color: #7a6e65; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2.5rem; }
  .nav-btn {
    background: rgba(245, 240, 232, 0.88);
    border: 0.5px solid #c5bab0;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    color: #7a6e65;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.04em;
    font-family: Georgia, serif;
  }
  .nav-btn:hover { background: #e6ddd1; color: #3a3530; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary { background: #3a3530; color: #F5F0E8; border-color: #3a3530; }
  .nav-btn.primary:hover { background: #2a2720; }

  .dot-nav { display: flex; gap: 6px; align-items: center; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #d9d0c4; transition: all 0.2s; }
  .dot.active { background: #7a6e65; width: 16px; border-radius: 3px; }
  .dot.done { background: #b5a898; }

  /* Section pills */
  .section-heads { display: flex; gap: 8px; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .sec-pill { font-size: 11px; letter-spacing: 0.1em; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
  .sec-pill.done { background: #d6ccbf; color: #7a6e65; }
  .sec-pill.active { background: #3a3530; color: #F5F0E8; }
  .sec-pill.todo { background: rgba(238, 233, 224, 0.96); color: #b5a898; border: 0.5px solid #d9d0c4; }

  /* Result screen */
  .result-screen { text-align: center; }

  .type-icon-wrap { margin: 0 auto 1.2rem; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
  .type-icon-wrap svg { width: 64px; height: 64px; fill: #3a3530; }

  .type-display { margin: 0.5rem 0 1rem; }
  .type-letters { font-size: 52px; font-weight: 400; letter-spacing: 0.15em; color: #3a3530; line-height: 1; }
  .type-name { font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: #9c9186; margin-top: 10px; }

  .result-card {
    background: rgba(238, 233, 224, 0.96);
    border: 0.5px solid #d9d0c4;
    border-radius: 14px;
    padding: 2rem;
    text-align: left;
    margin: 1.5rem 0;
  }
  .result-card p { font-size: 16px; line-height: 1.75; color: #5a5148; }
  .hidden-insight { margin-top: 0.85rem; }

  .traits-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
  .trait-block { background: rgba(245, 240, 232, 0.97); border: 0.5px solid #d9d0c4; border-radius: 10px; padding: 12px 14px; }
  .trait-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #b5a898; margin-bottom: 5px; }
  .trait-list { font-size: 13px; color: #5a5148; line-height: 1.6; }
  .trait-list ul { margin: 0; padding-left: 1.15rem; }
  .trait-list li { margin-bottom: 4px; }
  .trait-list li:last-child { margin-bottom: 0; }
  .trait-list li::marker { color: #b5a898; font-size: 0.85em; }
  .result-section { margin-top: 1.5rem; }
  .result-card .section-copy { font-size: 13px; line-height: 1.65; color: #5a5148; margin: 0; }
  .result-detail-grid { margin-top: 1rem; }

  .people-row { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 0.5px solid #d9d0c4; }
  .people-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #b5a898; margin-bottom: 10px; }
  .people-list { display: flex; flex-direction: column; gap: 8px; }
  .person-item { display: flex; align-items: center; gap: 10px; }
  .person-dot {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    background: #fff;
    border: 1px solid #d9d0c4;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    box-shadow: 0 1px 4px rgba(58,53,48,0.14);
  }
  .person-dot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: grayscale(1) contrast(1.1);
  }

  .person-name { font-size: 13px; font-weight: 500; color: #5a5148; }

  .person-text { display: flex; flex-direction: column; gap: 2px; }
  .person-title { font-size: 11px; color: #9c9186; line-height: 1.35; letter-spacing: 0.02em; }

  .careers-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .career-tag { background: rgba(245, 240, 232, 0.97); border: 0.5px solid #d9d0c4; border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #7a6e65; letter-spacing: 0.03em; }

  .score-bars { margin: 1.5rem 0; }
  .score-track { flex: 1; height: 4px; background: #e0d8cc; border-radius: 2px; position: relative; }
  .score-marker { position: absolute; top: -4px; width: 12px; height: 12px; border-radius: 50%; background: #3a3530; transform: translateX(-50%); }

  .restart-btn {
    background: transparent;
    border: 0.5px solid #c5bab0;
    border-radius: 8px;
    padding: 11px 28px;
    font-size: 14px;
    color: #7a6e65;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.18s ease;
    margin-top: 1.5rem;
    font-family: Georgia, serif;
  }
  .restart-btn:hover { background: #e6ddd1; color: #3a3530; }

  /* Intro screen */
  .intro-screen { text-align: center; padding: 1rem 0 2rem; }
  .intro-badge { display: inline-block; background: rgba(245, 240, 232, 0.75); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #b5a898; border: 0.5px solid #d9d0c4; border-radius: 20px; padding: 4px 14px; margin-bottom: 2rem; }
  .intro-title { font-size: 36px; font-weight: 400; color: #3a3530; line-height: 1.2; margin-bottom: 1rem; letter-spacing: 0.02em; }
  .intro-sub { font-size: 15px; color: #7a6e65; line-height: 1.8; margin-bottom: 2.5rem; }
  .intro-divider { width: 40px; height: 1px; background: #d9d0c4; margin: 2rem auto; }
  .intro-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 2.5rem; }
  .stat-block { background: rgba(238, 233, 224, 0.96); border: 0.5px solid #d9d0c4; border-radius: 12px; padding: 16px 10px; }
  .stat-num { font-size: 22px; font-weight: 400; color: #3a3530; margin-bottom: 4px; }
  .stat-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #9c9186; }
  .intro-note { font-size: 13px; color: #a09585; line-height: 1.7; margin-bottom: 2rem; font-style: italic; }
  .start-btn { background: #3a3530; color: #F5F0E8; border: none; border-radius: 10px; padding: 14px 40px; font-size: 15px; cursor: pointer; letter-spacing: 0.06em; transition: all 0.18s ease; font-family: Georgia, serif; }
  .start-btn:hover { background: #2a2720; }


  /* Loading screen */
  .loading-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #F5F0E8;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.65s ease, visibility 0.65s ease;
  }
  .loading-screen.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .loading-content {
    text-align: center;
    padding: 2rem;
    animation: loadingFloat 1.6s ease-in-out infinite alternate;
  }
  .loading-kicker {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #9c9186;
    margin-bottom: 0.8rem;
  }
  .loading-title {
    font-size: 34px;
    line-height: 1.15;
    color: #3a3530;
    letter-spacing: 0.04em;
    font-weight: 400;
  }
  .loading-made {
    margin-top: 0.85rem;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: rgba(58, 53, 48, 0.42);
    text-transform: uppercase;
  }
  .loading-line {
    width: 150px;
    height: 2px;
    background: #e0d8cc;
    border-radius: 999px;
    margin: 1.4rem auto 0;
    overflow: hidden;
  }
  .loading-line span {
    display: block;
    width: 42%;
    height: 100%;
    background: #3a3530;
    border-radius: 999px;
    animation: loadingSlide 1.05s ease-in-out infinite;
  }
  @keyframes loadingSlide {
    0% { transform: translateX(-110%); }
    100% { transform: translateX(260%); }
  }
  @keyframes loadingFloat {
    from { transform: translateY(0); opacity: 0.88; }
    to { transform: translateY(-4px); opacity: 1; }
  }

  /* Button motion */
  .start-btn,
  .nav-btn.primary,
  .restart-btn,
  .share-btn,
  .premium-btn {
    transform: scale(1);
    transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .start-btn:hover,
  .nav-btn.primary:hover,
  .restart-btn:hover,
  .share-btn:hover,
  .premium-btn:hover {
    transform: scale(1.055);
    box-shadow: 0 8px 18px rgba(58, 53, 48, 0.12);
  }
  .start-btn:active,
  .nav-btn.primary:active,
  .restart-btn:active,
  .share-btn:active,
  .premium-btn:active {
    transform: scale(0.985);
  }

  .fade-in { animation: fadeIn 0.35s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .option-btn,
  .nav-btn,
  .intro-badge,
  .stat-block,
  .result-card,
  .trait-block,
  .career-tag,
  .sec-pill.todo {
    -webkit-backdrop-filter: blur(1.5px);
    backdrop-filter: blur(1.5px);
  }

  @media (orientation: landscape) {
    body::before {
      background-position: center center;
      background-size: auto 100vh;
      opacity: 0.12;
    }
    .app {
      max-width: 760px;
      padding-left: 1.8rem;
      padding-right: 1.8rem;
    }
  }

  @media (min-width: 900px) {
    body::before {
      background-position: center center;
      background-size: auto 100vh;
      opacity: 0.115;
    }
  }

  @media (min-width: 1200px) {
    body::before {
      background-size: auto 105vh;
      opacity: 0.105;
    }
  }

  @media (max-width: 640px) {
    body::before {
      background-position: center center;
      background-size: cover;
      opacity: 0.15;
    }
  }

</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="loading-content">
    <div class="loading-kicker">Personality Style</div>
    <div class="loading-title">16 Personality Style Test</div>
    <div class="loading-made">made by Yparx1</div>
    <div class="loading-line"><span></span></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <h1>Personality</h1>
    <p>Know your type</p>
  </div>
  <div id="quiz-area"></div>
</div>

<script>
const questions = [
  { q:"You feel something strong, but you do not understand it yet. What usually helps you understand it?", a:"I need quiet time alone before I can understand what I feel.", b:"I understand it better when I talk to someone I trust.", section:"E vs I" },
  { q:"You are at a party with close friends and some people you do not know. What do you naturally do first?", a:"I open myself to new people and join different conversations.", b:"I stay near the people I already feel comfortable with.", section:"E vs I" },
  { q:"Something good happens to you, and your heart feels full. What feels more natural?", a:"I want to share it with someone soon.", b:"I want to keep it to myself first and enjoy it privately.", section:"E vs I" },
  { q:"You spend a whole day mostly alone with your own thoughts. How does it usually affect you?", a:"I feel calm, rested, and more like myself.", b:"I start to feel disconnected and want to be around people.", section:"E vs I" },
  { q:"You are trying to understand who you are becoming. What helps more?", a:"Hearing myself talk about it with someone.", b:"Sitting with my thoughts until they become clear.", section:"E vs I" },
  { q:"You visit an old family home. What do you notice first?", a:"The rooms, smells, sounds, food, and small details.", b:"The memories, mood, and meaning the place seems to hold.", section:"S vs N" },
  { q:"A friend keeps repeating the same mistake. What do you try to understand first?", a:"Why this pattern keeps happening in their life.", b:"What exactly happened each time.", section:"S vs N" },
  { q:"You look at an old family photo. What do you think about first?", a:"The people, clothes, place, and real details in the photo.", b:"The story behind it and what those people may have felt.", section:"S vs N" },
  { q:"Someone close to you starts acting differently, but they do not explain why. What do you trust more?", a:"The small clues that suggest something deeper is going on.", b:"What they actually say and do.", section:"S vs N" },
  { q:"You think about your future late at night. What comes first in your mind?", a:"What is realistic based on your life right now.", b:"What your life could become if your choices, habits, or direction changed.", section:"S vs N" },
  { q:"Someone you care about is hurt and asks what you think. What comes first for you?", a:"I want to help them feel understood before anything else.", b:"I want to help them see the situation clearly.", section:"T vs F" },
  { q:"Two people you love are both upset with each other. What do you look for first?", a:"What is fair, true, and reasonable.", b:"What each person is feeling and needing.", section:"T vs F" },
  { q:"Someone close to you hurts you, but you still care about them. What matters more when you speak?", a:"Being honest and clear about what was wrong.", b:"Being careful with their feelings while I explain mine.", section:"T vs F" },
  { q:"You make a hard choice that affects other people. What helps you feel at peace?", a:"Knowing my choice was fair and made sense.", b:"Knowing my choice respected people's feelings and values.", section:"T vs F" },
  { q:"A conversation becomes emotional and tense. What do you pay attention to first?", a:"The relationship and the feelings involved.", b:"The truth and the facts of the situation.", section:"T vs F" },
  { q:"Your family or friends are planning something, but the details are still not final. What feels more natural to you?", a:"I feel better when the main plan is settled early, even if small things can still change.", b:"I feel better when the plan stays open, so there is room to decide later.", section:"J vs P" },
  { q:"You have two good choices, and both could lead to something different. What do you usually prefer?", a:"I keep thinking and exploring until one choice feels right.", b:"I choose a direction so I can focus and move forward.", section:"J vs P" },
  { q:"You are starting something new, but you do not know exactly how it will go. What feels more comfortable?", a:"I like having clear steps before I begin.", b:"I like learning what to do as I go.", section:"J vs P" },
  { q:"You have many possible paths in front of you. What feels harder for you?", a:"Choosing too early and losing other possibilities.", b:"Staying unsure for too long and not moving forward.", section:"J vs P" },
  { q:"A plan suddenly changes, and things do not happen the way you expected. What do you naturally do first?", a:"I make a new plan so things feel clear again.", b:"I adjust to the moment and see what works.", section:"J vs P" }
];

const scoring = {
  EI: [{A:'I',B:'E'},{A:'E',B:'I'},{A:'E',B:'I'},{A:'I',B:'E'},{A:'E',B:'I'}],
  SN: [{A:'S',B:'N'},{A:'N',B:'S'},{A:'S',B:'N'},{A:'N',B:'S'},{A:'S',B:'N'}],
  TF: [{A:'F',B:'T'},{A:'T',B:'F'},{A:'T',B:'F'},{A:'T',B:'F'},{A:'F',B:'T'}],
  JP: [{A:'J',B:'P'},{A:'P',B:'J'},{A:'J',B:'P'},{A:'P',B:'J'},{A:'J',B:'P'}]

let appAudioCtx = null;
let soundUnlocked = false;
let finishSoundPlayed = false;

function getAudioCtx() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return null;
  if (!appAudioCtx) appAudioCtx = new AudioContextClass();
  return appAudioCtx;
}

function unlockSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  soundUnlocked = true;
}

function playTone(freq = 660, duration = 0.08, gainLevel = 0.04, type = 'sine') {
  const ctx = getAudioCtx();
  if (!ctx || !soundUnlocked) return;

  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();

  oscillator.type = type;
  oscillator.frequency.setValueAtTime(freq, ctx.currentTime);

  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(gainLevel, ctx.currentTime + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

  oscillator.connect(gain);
  gain.connect(ctx.destination);

  oscillator.start(ctx.currentTime);
  oscillator.stop(ctx.currentTime + duration + 0.02);
}

function playClickTone() {
  unlockSound();
  playTone(720, 0.075, 0.035, 'sine');
  setTimeout(() => playTone(920, 0.06, 0.025, 'sine'), 45);
}

function playFinishBell() {
  unlockSound();
  const ctx = getAudioCtx();
  if (!ctx || !soundUnlocked) return;

  const notes = [
    { freq: 659.25, time: 0, gain: 0.035 },
    { freq: 783.99, time: 0.12, gain: 0.032 },
    { freq: 987.77, time: 0.25, gain: 0.028 }
  ];

  notes.forEach(note => {
    const oscillator = ctx.createOscillator();
    const gain = ctx.createGain();

    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(note.freq, ctx.currentTime + note.time);

    gain.gain.setValueAtTime(0.0001, ctx.currentTime + note.time);
    gain.gain.exponentialRampToValueAtTime(note.gain, ctx.currentTime + note.time + 0.025);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + note.time + 0.85);

    oscillator.connect(gain);
    gain.connect(ctx.destination);

    oscillator.start(ctx.currentTime + note.time);
    oscillator.stop(ctx.currentTime + note.time + 0.9);
  });
}

function hideLoadingScreen() {
  const loader = document.getElementById('loading-screen');
  if (!loader) return;
  setTimeout(() => loader.classList.add('hide'), 1200);
  setTimeout(() => loader.remove(), 2100);
}

  if (e.target.closest('button, .premium-btn')) playClickTone();
}, true);

function getSectionIndex(i) { return Math.floor(i / 5); }

function getType() {
  let c = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for(let i=0;i<5;i++){
    if(answers[i]) c[scoring.EI[i][answers[i]]]++;
    if(answers[i+5]) c[scoring.SN[i][answers[i+5]]]++;
    if(answers[i+10]) c[scoring.TF[i][answers[i+10]]]++;
    if(answers[i+15]) c[scoring.JP[i][answers[i+15]]]++;
  }
  return (c.E>=c.I?'E':'I')+(c.S>=c.N?'S':'N')+(c.T>=c.F?'T':'F')+(c.J>=c.P?'J':'P');
}

function getScores() {
  let s = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for(let i=0;i<5;i++){
    if(answers[i]) s[scoring.EI[i][answers[i]]]++;
    if(answers[i+5]) s[scoring.SN[i][answers[i+5]]]++;
    if(answers[i+10]) s[scoring.TF[i][answers[i+10]]]++;
    if(answers[i+15]) s[scoring.JP[i][answers[i+15]]]++;
  }
  return s;
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('');
}

function renderResult() {
  const type = getType();
  const s = getScores();
  const d = descriptions[type];
  const svgIcon = typeIcons[type];
  const area = document.getElementById('quiz-area');

  
  if (!finishSoundPlayed) {
    finishSoundPlayed = true;
    setTimeout(playFinishBell, 260);
  }
// dims: left side is the "positive" direction, pct = how much of RIGHT side
  const dims = [
    {l:'E',r:'I',ls:s.E,rs:s.I,lLabel:'Extrovert',rLabel:'Introvert'},
    {l:'S',r:'N',ls:s.S,rs:s.N,lLabel:'Sensing',rLabel:'Intuition'},
    {l:'T',r:'F',ls:s.T,rs:s.F,lLabel:'Thinking',rLabel:'Feeling'},
    {l:'J',r:'P',ls:s.J,rs:s.P,lLabel:'Judging',rLabel:'Perceiving'}
  ];

  area.innerHTML = `
    <div class="result-screen fade-in">
      <div style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#9c9186;margin-bottom:1rem">Your type</div>
      <div class="type-icon-wrap">${svgIcon}</div>
      <div class="type-display">
        <div class="type-letters">${type}</div>
        <div class="type-name">${d.name}</div>
      </div>

      <div class="score-bars">
        ${dims.map(dim=>{
          const total = dim.ls + dim.rs;
          // pct represents position: 0% = fully left (E/S/T/J), 100% = fully right (I/N/F/P)
          const pct = total > 0 ? Math.round((dim.rs / total) * 100) : 50;
          return `<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#9c9186;letter-spacing:0.06em;margin-bottom:6px">
              <span>${dim.lLabel.toUpperCase()} ${dim.l}</span><span>${dim.r} ${dim.rLabel.toUpperCase()}</span>
            </div>
            <div class="score-track"><div class="score-marker" style="left:${pct}%"></div></div>
          </div>`;
        }).join('')}
      </div>

      <div class="result-card">
        <p>${d.desc}</p>
        <p class="hidden-insight">${d.hidden}</p>
        <div class="traits-row">
          <div class="trait-block">
            <div class="trait-label">Strengths</div>
            <div class="trait-list"><ul>${d.strengths.map(item=>`<li>${item}</li>`).join('')}</ul></div>
          </div>
          <div class="trait-block">
            <div class="trait-label">Watch for</div>
            <div class="trait-list"><ul>${d.weaknesses.map(item=>`<li>${item}</li>`).join('')}</ul></div>
          </div>
        </div>

        <div class="result-section">
          <div class="trait-label" style="margin-bottom:8px">Career paths</div>
          <div class="careers-row">${d.careers.map(c=>`<span class="career-tag">${c}</span>`).join('')}</div>
        </div>

        <div class="traits-row result-detail-grid">
          <div class="trait-block">
            <div class="trait-label">Love style</div>
            <p class="section-copy">${d.love}</p>
          </div>
          <div class="trait-block">
            <div class="trait-label">Friendship style</div>
            <p class="section-copy">${d.friendship}</p>
          </div>
        </div>

        <div class="result-section">
          <div class="trait-label" style="margin-bottom:8px">Personal growth tips</div>
          <p class="section-copy">${d.growth}</p>
        </div>

        <div class="people-row">
          <div class="people-label">Iconic people</div>
          <div class="people-list">
            ${d.people.map(p=>`
              <div class="person-item">
                <div class="person-dot">
                  <img src="${personPortraits[p] || ''}" alt="${p}">
                </div>
                <div class="person-text">
                  <div class="person-name">${p}</div>
                  <div class="person-title">${personTitles[p] || ''}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <button class="restart-btn" onclick="restart()">Retake the test</button>
    </div>
  `;
}

function renderIntro() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <div class="intro-screen fade-in">
      <div class="intro-badge">Personality Test</div>
      <div class="intro-title">What kind of person<br>are you, really?</div>
      <div class="intro-sub">This test looks at how you think, feel, and move through the world. Answer honestly. There are no right or wrong answers, only your truth.</div>
      <div class="intro-stats" style="grid-template-columns:1fr;">
        <div class="stat-block"><div class="stat-num">20</div><div class="stat-label">Questions</div></div>
      </div>
      <div class="intro-note">Choose A or B for each question. Go with your first instinct. Choose the answer that feels most like you, most of the time.</div>
      <div style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#b5a898;margin-bottom:1.5rem;">by Yparx1</div>
      <button class="start-btn" onclick="startQuiz()">Begin the test</button>
    </div>
  `;
}

function startQuiz() { current = 0; renderQuestion(); }

function renderQuestion() {
  const q = questions[current];
  const secIdx = getSectionIndex(current);
  // Progress should reflect the visible question position, not how many answers are filled.
  // This prevents the last screen from showing values like "16 of 20" when the user is on Q20.
  const progressNumber = current + 1;
  const pct = Math.round((progressNumber / questions.length) * 100);
  const area = document.getElementById('quiz-area');

  const dots = questions.map((_,i)=>{
    if(answers[i]) return `<div class="dot done"></div>`;
    if(i===current) return `<div class="dot active"></div>`;
    return `<div class="dot"></div>`;
  });

  const pillsHtml = sections.map((s,i)=>{
    const cls = i < secIdx ? 'done' : i === secIdx ? 'active' : 'todo';
    return `<span class="sec-pill ${cls}">${sectionLabels[i]}</span>`;
  }).join('');

  area.innerHTML = `
    <div class="fade-in">
      <div class="section-heads">${pillsHtml}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>${progressNumber} of ${questions.length}</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="question-block">
        <div style="display:inline-block;font-size:11px;color:#b5a898;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;padding:4px 10px;border:1px solid #cfc2b0;border-radius:999px;background:transparent">Q${current+1}</div>
        <div class="question-text">${q.q}</div>
        <div class="options">
          <button class="option-btn${answers[current]==='A'?' selected':''}" onclick="choose('A')">
            <span class="option-letter">A</span><span>${q.a}</span>
          </button>
          <button class="option-btn${answers[current]==='B'?' selected':''}" onclick="choose('B')">
            <span class="option-letter">B</span><span>${q.b}</span>
          </button>
        </div>
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="prev()" ${current===0?'disabled':''}>Back</button>
        <div class="dot-nav">${dots.slice(Math.max(0,current-3),current+4).join('')}</div>
        ${current<19
          ? `<button class="nav-btn primary" onclick="next()" ${!answers[current]?'disabled':''}>Next</button>`
          : `<button class="nav-btn primary" onclick="finish()" ${!answers[current]?'disabled':''}>See result</button>`
        }
      </div>
    </div>
  `;
}

function choose(opt) {
  answers[current] = opt;
  renderQuestion();
  if(current < 19) setTimeout(()=>{ current++; renderQuestion(); }, 280);
}

function prev() { if(current>0){ current--; renderQuestion(); } }
function next() { if(answers[current]&&current<19){ current++; renderQuestion(); } }
function finish() { if(answers[current]) renderResult(); }
function restart() { answers = new Array(20).fill(null); current=0; renderIntro(); }

renderIntro();
</script>
</body>
</html>
