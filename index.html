<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI Personality Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F5F0E8;
    font-family: Georgia, serif;
    min-height: 100vh;
    color: #3a3530;
  }
  .app { max-width: 620px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .header { text-align: center; margin-bottom: 3rem; }
  .header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.18em; color: #9c9186; text-transform: uppercase; margin-bottom: 0.5rem; }
  .header p { font-size: 22px; font-weight: 400; color: #3a3530; line-height: 1.4; }

  .progress-wrap { margin-bottom: 2.5rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #a09585; margin-bottom: 8px; letter-spacing: 0.05em; }
  .progress-bar { height: 2px; background: #e0d8cc; border-radius: 2px; }
  .progress-fill { height: 2px; background: #b5a898; border-radius: 2px; transition: width 0.4s ease; }

  .question-block { margin-bottom: 2.5rem; }
  .question-text { font-size: 17px; line-height: 1.65; color: #3a3530; margin-bottom: 1.2rem; font-weight: 400; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: #EEE9E0;
    border: 0.5px solid #d9d0c4;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    font-size: 15px;
    color: #5a5148;
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.5;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-family: Georgia, serif;
  }
  .option-btn:hover { background: #e6ddd1; border-color: #c5bab0; color: #3a3530; }
  .option-btn.selected { background: #d6ccbf; border-color: #b5a898; color: #3a3530; }
  .option-letter { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: #b5a898; min-width: 14px; margin-top: 2px; text-transform: uppercase; }
  .option-btn.selected .option-letter { color: #7a6e65; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2.5rem; }
  .nav-btn {
    background: transparent;
    border: 0.5px solid #c5bab0;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    color: #7a6e65;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.04em;
    font-family: Georgia, serif;
  }
  .nav-btn:hover { background: #e6ddd1; color: #3a3530; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary { background: #3a3530; color: #F5F0E8; border-color: #3a3530; }
  .nav-btn.primary:hover { background: #2a2720; }

  .dot-nav { display: flex; gap: 6px; align-items: center; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #d9d0c4; transition: all 0.2s; }
  .dot.active { background: #7a6e65; width: 16px; border-radius: 3px; }
  .dot.done { background: #b5a898; }

  /* Section pills */
  .section-heads { display: flex; gap: 8px; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .sec-pill { font-size: 11px; letter-spacing: 0.1em; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
  .sec-pill.done { background: #d6ccbf; color: #7a6e65; }
  .sec-pill.active { background: #3a3530; color: #F5F0E8; }
  .sec-pill.todo { background: #EEE9E0; color: #b5a898; border: 0.5px solid #d9d0c4; }

  /* Result screen */
  .result-screen { text-align: center; }

  .type-icon-wrap { margin: 0 auto 1.2rem; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
  .type-icon-wrap svg { width: 64px; height: 64px; fill: #3a3530; }

  .type-display { margin: 0.5rem 0 1rem; }
  .type-letters { font-size: 52px; font-weight: 400; letter-spacing: 0.15em; color: #3a3530; line-height: 1; }
  .type-name { font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: #9c9186; margin-top: 10px; }

  .type-divider { width: 40px; height: 1px; background: #d9d0c4; margin: 1.5rem auto; }

  .result-card {
    background: #EEE9E0;
    border: 0.5px solid #d9d0c4;
    border-radius: 14px;
    padding: 2rem;
    text-align: left;
    margin: 1.5rem 0;
  }
  .result-card p { font-size: 16px; line-height: 1.75; color: #5a5148; }

  .traits-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
  .trait-block { background: #F5F0E8; border: 0.5px solid #d9d0c4; border-radius: 10px; padding: 12px 14px; }
  .trait-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #b5a898; margin-bottom: 5px; }
  .trait-list { font-size: 13px; color: #5a5148; line-height: 1.6; }

  .people-row { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 0.5px solid #d9d0c4; }
  .people-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #b5a898; margin-bottom: 10px; }
  .people-list { display: flex; flex-direction: column; gap: 8px; }
  .person-item { display: flex; align-items: center; gap: 10px; }
  .person-dot { width: 32px; height: 32px; border-radius: 50%; background: #d6ccbf; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #7a6e65; flex-shrink: 0; letter-spacing: 0.04em; }
  .person-name { font-size: 13px; font-weight: 500; color: #5a5148; }

  .careers-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .career-tag { background: #F5F0E8; border: 0.5px solid #d9d0c4; border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #7a6e65; letter-spacing: 0.03em; }

  .score-bars { margin: 1.5rem 0; }
  .score-track { flex: 1; height: 4px; background: #e0d8cc; border-radius: 2px; position: relative; }
  .score-marker { position: absolute; top: -4px; width: 12px; height: 12px; border-radius: 50%; background: #3a3530; transform: translateX(-50%); }

  .restart-btn {
    background: transparent;
    border: 0.5px solid #c5bab0;
    border-radius: 8px;
    padding: 11px 28px;
    font-size: 14px;
    color: #7a6e65;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.18s ease;
    margin-top: 1.5rem;
    font-family: Georgia, serif;
  }
  .restart-btn:hover { background: #e6ddd1; color: #3a3530; }

  .fade-in { animation: fadeIn 0.35s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

  </div>

  ISTJ:{name:"The Logistician",desc:"Steady, practical, and responsible. You trust what is proven, clear, and realistic and others rely on you because you take commitments seriously. Care shows through consistency, not performance.",strengths:["Reliable and dependable","Highly disciplined","Careful with details","Deeply loyal","Organized and methodical"],weaknesses:["Can be rigid and inflexible","Overly serious at times","Resistant to change","Struggles with emotional expression","May miss the bigger picture"],careers:["Accountant","Operations Manager","Data Analyst"],people:["Queen Elizabeth II","Warren Buffett","George Washington"]},

  ESTJ:{name:"The Executive",desc:"Direct, organized, and practical. You like clear standards, structure, and efficient action. When something needs leadership or order, you step forward naturally. You want things to work and people to take their duties seriously.",strengths:["Highly organized","Decisive and confident","Responsible and reliable","Strong natural leader","Excellent at execution"],weaknesses:["Can be controlling","Impatient with others","Inflexible under pressure","Struggles with emotions","May seem harsh or blunt"],careers:["Project Manager","Operations Director","Business Administrator"],people:["Judge Judy","Henry Ford","Sonia Sotomayor"]},
  ESFJ:{name:"The Consul",desc:"Warm, responsible, and socially aware. You care deeply about harmony, belonging, and making sure people feel supported, noticing emotional needs quickly and becoming the natural organizer in your communities.",strengths:["Warm and supportive","Reliable and responsible","Strong social awareness","Naturally cooperative","Creates harmony easily"],weaknesses:["Prone to people-pleasing","Takes criticism personally","Needs external approval","Avoids difficult truths","Can be overly traditional"],careers:["Teacher","Nurse","Community Manager"],people:["Taylor Swift","Jennifer Garner","Bill Clinton"]},
  ENFJ:{name:"The Protagonist",desc:"Empathetic, expressive, and purpose-driven. You see potential in others and feel drawn to helping people grow. A natural guide who understands emotions and group energy well, though you may give more than you keep.",strengths:["Deeply empathetic","Naturally inspiring and charismatic","Excellent communicator","Supportive and encouraging","Visionary and purposeful"],weaknesses:["Overextends and burns out","Becomes too personally involved","Neglects own needs","Struggles with criticism","Can be overly idealistic"],careers:["Counselor","Teacher","Team Leader"],people:["Oprah Winfrey","Barack Obama","Nelson Mandela"]},
  ENTJ:{name:"The Commander",desc:"Ambitious, strategic, and decisive. You see goals clearly and know how to organize people, systems, and plans to reach them. Comfortable making decisions and pushing forward, your challenge is balancing achievement with patience.",strengths:["Strategic and visionary","Highly confident and decisive","Strong natural leader","Goal-oriented and driven","Excellent at organizing people"],weaknesses:["Can be intense or overbearing","Impatient with others","Blunt to the point of harshness","Overly focused on success","Struggles with vulnerability"],careers:["Executive Manager","Management Consultant","Entrepreneur"],people:["Steve Jobs","Margaret Thatcher","Julius Caesar"]}
};

let answers = new Array(20).fill(null);
let current = 0;
const sections = ["E vs I","S vs N","T vs F","J vs P"];
const sectionLabels = ["Energy","Perception","Judgment","Structure"];

function getSectionIndex(i) { return Math.floor(i / 5); }

function getType() {
  let c = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for(let i=0;i<5;i++){
    if(answers[i]) c[scoring.EI[i][answers[i]]]++;
    if(answers[i+5]) c[scoring.SN[i][answers[i+5]]]++;
    if(answers[i+10]) c[scoring.TF[i][answers[i+10]]]++;
    if(answers[i+15]) c[scoring.JP[i][answers[i+15]]]++;
  }
  return (c.E>=c.I?'E':'I')+(c.S>=c.N?'S':'N')+(c.T>=c.F?'T':'F')+(c.J>=c.P?'J':'P');
}

function getScores() {
  let s = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for(let i=0;i<5;i++){
    if(answers[i]) s[scoring.EI[i][answers[i]]]++;
    if(answers[i+5]) s[scoring.SN[i][answers[i+5]]]++;
    if(answers[i+10]) s[scoring.TF[i][answers[i+10]]]++;
    if(answers[i+15]) s[scoring.JP[i][answers[i+15]]]++;
  }
  return s;
}

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('');
}

function renderResult() {
  const type = getType();
  const s = getScores();
  const d = descriptions[type];
  const svgIcon = typeIcons[type];
  const area = document.getElementById('quiz-area');

  const dims = [
    {l:'E',r:'I',ls:s.E,rs:s.I,lLabel:'Extrovert',rLabel:'Introvert'},
    {l:'S',r:'N',ls:s.S,rs:s.N,lLabel:'Sensing',rLabel:'Intuition'},
    {l:'T',r:'F',ls:s.T,rs:s.F,lLabel:'Thinking',rLabel:'Feeling'},
    {l:'J',r:'P',ls:s.J,rs:s.P,lLabel:'Judging',rLabel:'Perceiving'}
  ];

  area.innerHTML = `
    <div class="result-screen fade-in">
      <div style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#9c9186;margin-bottom:1rem">Your type</div>
      <div class="type-icon-wrap">${svgIcon}</div>
      <div class="type-display">
        <div class="type-letters">${type}</div>
        <div class="type-name">${d.name}</div>
      </div>

      <div class="score-bars">
        ${dims.map(dim=>{
          const total = dim.ls + dim.rs;
          const pct = total > 0 ? Math.round((dim.ls/total)*100) : 50;
          return `<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#9c9186;letter-spacing:0.06em;margin-bottom:6px">
              <span>${dim.lLabel.toUpperCase()} ${dim.l}</span><span>${dim.r} ${dim.rLabel.toUpperCase()}</span>
            </div>
            <div class="score-track"><div class="score-marker" style="left:${pct}%"></div></div>
          </div>`;
        }).join('')}
      </div>

      <div class="type-divider"></div>

      <div class="result-card">
        <p>${d.desc}</p>
        <div class="traits-row">
          <div class="trait-block">
            <div class="trait-label">Strengths</div>
            <div class="trait-list">${d.strengths.join('<br>')}</div>
          </div>
          <div class="trait-block">
            <div class="trait-label">Watch for</div>
            <div class="trait-list">${d.weaknesses.join('<br>')}</div>
          </div>
        </div>
        <div style="margin-top:1.5rem">
          <div class="trait-label" style="margin-bottom:8px">Often suited for</div>
          <div class="careers-row">${d.careers.map(c=>`<span class="career-tag">${c}</span>`).join('')}</div>
        </div>
        <div class="people-row">
          <div class="people-label">Often associated with</div>
          <div class="people-list">
            ${d.people.map(p=>`
              <div class="person-item">
                <div class="person-dot">${initials(p)}</div>
                <div class="person-name">${p}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <button class="restart-btn" onclick="restart()">Retake the test</button>
    </div>
  `;
}

function renderQuestion() {
  const q = questions[current];
  const secIdx = getSectionIndex(current);
  const totalAnswered = answers.filter(a=>a!==null).length;
  const pct = Math.round((totalAnswered / 20) * 100);
  const area = document.getElementById('quiz-area');

  const dots = questions.map((_,i)=>{
    if(answers[i]) return `<div class="dot done"></div>`;
    if(i===current) return `<div class="dot active"></div>`;
    return `<div class="dot"></div>`;
  });

  const pillsHtml = sections.map((s,i)=>{
    const cls = i < secIdx ? 'done' : i === secIdx ? 'active' : 'todo';
    return `<span class="sec-pill ${cls}">${sectionLabels[i]}</span>`;
  }).join('');

  area.innerHTML = `
    <div class="fade-in">
      <div class="section-heads">${pillsHtml}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>${totalAnswered} of 20</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="question-block">
        <div style="font-size:11px;color:#b5a898;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Q${current+1}</div>
        <div class="question-text">${q.q}</div>
        <div class="options">
          <button class="option-btn${answers[current]==='A'?' selected':''}" onclick="choose('A')">
            <span class="option-letter">A</span><span>${q.a}</span>
          </button>
          <button class="option-btn${answers[current]==='B'?' selected':''}" onclick="choose('B')">
            <span class="option-letter">B</span><span>${q.b}</span>
          </button>
        </div>
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="prev()" ${current===0?'disabled':''}>Back</button>
        <div class="dot-nav">${dots.slice(Math.max(0,current-3),current+4).join('')}</div>
        ${current<19
          ? `<button class="nav-btn primary" onclick="next()" ${!answers[current]?'disabled':''}>Next</button>`
          : `<button class="nav-btn primary" onclick="finish()" ${!answers[current]?'disabled':''}>See result</button>`
        }
      </div>
    </div>
  `;
}

function choose(opt) {
  answers[current] = opt;
  renderQuestion();
  if(current < 19) setTimeout(()=>{ current++; renderQuestion(); }, 280);
}

function prev() { if(current>0){ current--; renderQuestion(); } }
function next() { if(answers[current]&&current<19){ current++; renderQuestion(); } }
function finish() { if(answers[current]) renderResult(); }
function restart() { answers = new Array(20).fill(null); current=0; renderQuestion(); }

renderQuestion();
</script>
</body>
</html>
